name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server (lint + typecheck + test)
    runs-on: ubuntu-latest
    env:
      # Required by lib/config/index.ts at module load. Value doesn't
      # matter for tests (DB_DRIVER=dummy), it just has to exist.
      SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint --workspace=server
      - run: npm run typecheck --workspace=server
      - run: npm test --workspace=server
      # Regenerate the committed OpenAPI spec and fail if it drifts from
      # what's checked in. The react-app's typed client (PR D of #167)
      # codegens against this file; a stale committed spec would silently
      # break clients. Local devs regenerate via `npm run docs:dump`.
      - name: Verify server/openapi.json is up to date
        run: |
          npm run docs:dump --workspace=server
          git diff --exit-code -- server/openapi.json \
            || (echo "::error::server/openapi.json is out of date — run \`npm run docs:dump\` and commit the result" && exit 1)

  converter:
    name: Converter (lint + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint --workspace=converter
      - run: npm run typecheck --workspace=converter
      - run: npm test --workspace=converter

  react-app:
    name: React app (lint + typecheck + build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint --workspace=react-app
      # `vite build` uses esbuild which strips types without checking them,
      # so a missing dedicated `tsc --noEmit` step lets type errors slip
      # past CI. Run it explicitly.
      - run: npm run typecheck --workspace=react-app
      - run: npm run build --workspace=react-app
      - run: npm test --workspace=react-app
      # The typed API client is generated from server/openapi.json. Fail
      # CI if the committed `src/lib/api-schema.ts` is stale (committed
      # spec changed but codegen wasn't rerun) so the client and the
      # server contract can't silently drift. Local devs regenerate with
      # `npm run api:codegen --workspace=react-app`.
      - name: Verify react-app/src/lib/api-schema.ts is up to date
        run: |
          npm run api:codegen --workspace=react-app
          git diff --exit-code -- react-app/src/lib/api-schema.ts \
            || (echo "::error::react-app/src/lib/api-schema.ts is out of date — run \`npm run api:codegen --workspace=react-app\` and commit the result" && exit 1)
