name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      # Required by lib/config/index.js at module load. Value doesn't
      # matter for tests (DB_DRIVER=dummy), it just has to exist.
      SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  converter:
    name: Converter (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: converter
    steps:
      - uses: actions/checkout@v4
      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick
      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: converter/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  react-app:
    name: React app (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-app
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: react-app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
